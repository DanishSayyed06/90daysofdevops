services:
  web:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - app-net
    environment:
      - POSTGRES_DB=mydb
      - POSTGRES_USER=Danish
      - POSTGRES_PASSWORD=root

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_DB=mydb
      - POSTGRES_USER=Danish
      - POSTGRES_PASSWORD=root
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Danish -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net
    volumes:
      - db-data:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  app-net:

volumes:
  db-data:
